# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "01e2f5c1d5399b0925de511a7f87dabc"
name = "EasyCrm"
application_url = "https://example.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-04"

  # --- App lifecycle ---
  # Handled by: app/routes/webhooks.app.uninstalled.tsx
  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  # Handled by: app/routes/webhooks.app.scopes_update.tsx
  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  # --- CRM customer mirror (handled under app/routes/webhooks.customers.*.tsx) ---
  [[webhooks.subscriptions]]
  topics = [ "customers/create" ]
  uri = "/webhooks/customers/create"

  [[webhooks.subscriptions]]
  topics = [ "customers/update" ]
  uri = "/webhooks/customers/update"

  [[webhooks.subscriptions]]
  topics = [ "customers/delete" ]
  uri = "/webhooks/customers/delete"

  # --- Order activity timeline (handled under app/routes/webhooks.orders.*.tsx) ---
  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = [ "orders/paid" ]
  uri = "/webhooks/orders/paid"

  # --- Mandatory privacy/compliance topics (handled by app/routes/webhooks.compliance.tsx) ---
  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  uri = "/webhooks/compliance"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# Minimal scopes for a read-only CRM mirror. `write_customers` is intentionally omitted
# (writing CRM tags/metafields back to Shopify is the optional stretch — see DECISIONS.md §4).
# `read_all_orders` is deliberately NOT requested (requires Shopify approval).
scopes = "read_customers,read_orders"

[auth]
redirect_urls = [ "https://example.com/api/auth" ]
